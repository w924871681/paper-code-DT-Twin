name: publish-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare checksum-bound bootstrap assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p source-assets release-assets
          gh release download v1.1.3 \
            --pattern "level_c_bootstrap_v1.1.3.zip" \
            --dir source-assets
          test "$(stat -c%s source-assets/level_c_bootstrap_v1.1.3.zip)" = "64258937"
          echo "365df44a8cf4de1cabb21dd21aa6e865aff83a3f30d083e91caf18ed744ef650  source-assets/level_c_bootstrap_v1.1.3.zip" | sha256sum -c -
          cp source-assets/level_c_bootstrap_v1.1.3.zip \
            "release-assets/level_c_bootstrap_${GITHUB_REF_NAME}.zip"
          cd release-assets
          sha256sum "level_c_bootstrap_${GITHUB_REF_NAME}.zip" > \
            "level_c_bootstrap_${GITHUB_REF_NAME}.zip.sha256"
      - name: Fetch and verify exact-tag sanitized CUDA evidence
        run: |
          ASSET_BRANCH="release-assets/${GITHUB_REF_NAME}"
          git fetch origin \
            "refs/heads/${ASSET_BRANCH}:refs/remotes/origin/${ASSET_BRANCH}"
          git show \
            "refs/remotes/origin/${ASSET_BRANCH}:cuda_replay_evidence_${GITHUB_REF_NAME}.zip" \
            > "release-assets/cuda_replay_evidence_${GITHUB_REF_NAME}.zip"
          python scripts/verify_release_evidence.py \
            "release-assets/cuda_replay_evidence_${GITHUB_REF_NAME}.zip"
          cd release-assets
          sha256sum "cuda_replay_evidence_${GITHUB_REF_NAME}.zip" > \
            "cuda_replay_evidence_${GITHUB_REF_NAME}.zip.sha256"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_FILE="RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          if [ ! -f "${NOTES_FILE}" ]; then
            NOTES_FILE="RELEASE_NOTES_v1.1.0.md"
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${NOTES_FILE}" \
              --latest
          else
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${NOTES_FILE}" \
              --latest
          fi
      - name: Upload four release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "release-assets/level_c_bootstrap_${GITHUB_REF_NAME}.zip" \
            "release-assets/level_c_bootstrap_${GITHUB_REF_NAME}.zip.sha256" \
            "release-assets/cuda_replay_evidence_${GITHUB_REF_NAME}.zip" \
            "release-assets/cuda_replay_evidence_${GITHUB_REF_NAME}.zip.sha256" \
            --clobber
      - name: Download and verify published assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p downloaded-assets
          gh release download "${GITHUB_REF_NAME}" \
            --pattern "*.zip*" \
            --dir downloaded-assets
          cd downloaded-assets
          sha256sum -c "level_c_bootstrap_${GITHUB_REF_NAME}.zip.sha256"
          sha256sum -c "cuda_replay_evidence_${GITHUB_REF_NAME}.zip.sha256"
          python ../scripts/verify_release_evidence.py \
            "cuda_replay_evidence_${GITHUB_REF_NAME}.zip"
          test "$(stat -c%s "level_c_bootstrap_${GITHUB_REF_NAME}.zip")" = "64258937"
      - name: Verify published release state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(gh release view "${GITHUB_REF_NAME}" --json isDraft --jq .isDraft)" = "false"
          test "$(gh release view "${GITHUB_REF_NAME}" --json isPrerelease --jq .isPrerelease)" = "false"
          test "$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)" = "${GITHUB_REF_NAME}"
