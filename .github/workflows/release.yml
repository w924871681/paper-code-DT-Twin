name: publish-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Prepare checksum-bound Level-C assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p source-assets release-assets
          gh release download v1.1.4 \
            --pattern "*_v1.1.4.zip" \
            --dir source-assets
          test "$(stat -c%s source-assets/level_c_bootstrap_v1.1.4.zip)" = "64258937"
          test "$(stat -c%s source-assets/cuda_replay_evidence_v1.1.4.zip)" = "239612"
          echo "365df44a8cf4de1cabb21dd21aa6e865aff83a3f30d083e91caf18ed744ef650  source-assets/level_c_bootstrap_v1.1.4.zip" | sha256sum -c -
          echo "40c2bca3909142326df77f7af5c1698c6bbcc152eb7d36b28c147f0d4aa8a215  source-assets/cuda_replay_evidence_v1.1.4.zip" | sha256sum -c -
          python scripts/verify_release_evidence.py \
            source-assets/cuda_replay_evidence_v1.1.4.zip
          cp source-assets/level_c_bootstrap_v1.1.4.zip \
            "release-assets/level_c_bootstrap_${GITHUB_REF_NAME}.zip"
          cp source-assets/cuda_replay_evidence_v1.1.4.zip \
            "release-assets/cuda_replay_evidence_${GITHUB_REF_NAME}.zip"
          cd release-assets
          sha256sum "level_c_bootstrap_${GITHUB_REF_NAME}.zip" > \
            "level_c_bootstrap_${GITHUB_REF_NAME}.zip.sha256"
          sha256sum "cuda_replay_evidence_${GITHUB_REF_NAME}.zip" > \
            "cuda_replay_evidence_${GITHUB_REF_NAME}.zip.sha256"
      - name: Build paper-alignment asset
        run: |
          python -m pip install --disable-pip-version-check \
            numpy matplotlib Pillow pypdf
          python scripts/generate_paper_outputs.py
          cd outputs/paper_outputs
          zip -X -r "../../release-assets/paper_alignment_${GITHUB_REF_NAME}.zip" .
          cd ../../release-assets
          sha256sum "paper_alignment_${GITHUB_REF_NAME}.zip" > \
            "paper_alignment_${GITHUB_REF_NAME}.zip.sha256"
      - name: Build complete paper and final figure-code assets
        run: |
          zip -X -r "release-assets/rcf_dti_${GITHUB_REF_NAME}_complete.zip" \
            paper paper_assets/current_figures results/figure_data configs \
            reporting/final_figures.py reporting/frozen.py \
            scripts/generate_paper_outputs.py scripts/validate_paper_outputs.py \
            scripts/verify_repository.py docs audit \
            README.md CITATION.cff CHANGELOG.md \
            "RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          mkdir -p figure-code-package/scripts figure-code-package/paper_assets \
            figure-code-package/paper
          cp -r reporting figure-code-package/
          cp scripts/generate_paper_outputs.py \
            scripts/validate_paper_outputs.py figure-code-package/scripts/
          cp -r results configs figure-code-package/
          cp -r paper_assets/current_figures figure-code-package/paper_assets/
          cp -r paper/tables figure-code-package/paper/
          cp docs/FIGURE_REPRODUCTION.md requirements.txt \
            figure-code-package/
          cd figure-code-package
          zip -X -r "../release-assets/RCF_DTI_FIGURE_CODE_FINAL_V1_1_8.zip" .
          cd ../release-assets
          sha256sum "rcf_dti_${GITHUB_REF_NAME}_complete.zip" > \
            "rcf_dti_${GITHUB_REF_NAME}_complete.zip.sha256"
          sha256sum "RCF_DTI_FIGURE_CODE_FINAL_V1_1_8.zip" > \
            "RCF_DTI_FIGURE_CODE_FINAL_V1_1_8.zip.sha256"
          sha256sum *.zip > SHA256SUMS.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES_FILE="RELEASE_NOTES_${GITHUB_REF_NAME}.md"
          if [ ! -f "${NOTES_FILE}" ]; then
            NOTES_FILE="RELEASE_NOTES_v1.1.0.md"
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${NOTES_FILE}" \
              --latest
          else
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --notes-file "${NOTES_FILE}" \
              --latest
          fi
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "release-assets/level_c_bootstrap_${GITHUB_REF_NAME}.zip" \
            "release-assets/level_c_bootstrap_${GITHUB_REF_NAME}.zip.sha256" \
            "release-assets/cuda_replay_evidence_${GITHUB_REF_NAME}.zip" \
            "release-assets/cuda_replay_evidence_${GITHUB_REF_NAME}.zip.sha256" \
            "release-assets/paper_alignment_${GITHUB_REF_NAME}.zip" \
            "release-assets/paper_alignment_${GITHUB_REF_NAME}.zip.sha256" \
            "release-assets/rcf_dti_${GITHUB_REF_NAME}_complete.zip" \
            "release-assets/rcf_dti_${GITHUB_REF_NAME}_complete.zip.sha256" \
            "release-assets/RCF_DTI_FIGURE_CODE_FINAL_V1_1_8.zip" \
            "release-assets/RCF_DTI_FIGURE_CODE_FINAL_V1_1_8.zip.sha256" \
            "release-assets/SHA256SUMS.txt" \
            --clobber
      - name: Download and verify published assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p downloaded-assets
          gh release download "${GITHUB_REF_NAME}" \
            --pattern "*" \
            --dir downloaded-assets
          cd downloaded-assets
          sha256sum -c "level_c_bootstrap_${GITHUB_REF_NAME}.zip.sha256"
          sha256sum -c "cuda_replay_evidence_${GITHUB_REF_NAME}.zip.sha256"
          sha256sum -c "paper_alignment_${GITHUB_REF_NAME}.zip.sha256"
          sha256sum -c "rcf_dti_${GITHUB_REF_NAME}_complete.zip.sha256"
          sha256sum -c "RCF_DTI_FIGURE_CODE_FINAL_V1_1_8.zip.sha256"
          sha256sum -c SHA256SUMS.txt
          python ../scripts/verify_release_evidence.py \
            "cuda_replay_evidence_${GITHUB_REF_NAME}.zip"
          test "$(stat -c%s "level_c_bootstrap_${GITHUB_REF_NAME}.zip")" = "64258937"
          test "$(stat -c%s "cuda_replay_evidence_${GITHUB_REF_NAME}.zip")" = "239612"
      - name: Verify published release state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test "$(gh release view "${GITHUB_REF_NAME}" --json isDraft --jq .isDraft)" = "false"
          test "$(gh release view "${GITHUB_REF_NAME}" --json isPrerelease --jq .isPrerelease)" = "false"
          test "$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)" = "${GITHUB_REF_NAME}"
