name: repository-ci
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install -e ".[test]"
      - run: python -m compileall -q .
      - run: python scripts/verify_repository.py
      - run: python scripts/run_smoke_test.py
      - run: python scripts/generate_paper_outputs.py
      - run: python scripts/validate_paper_outputs.py
      - run: python scripts/verify_repository.py --generated-root outputs/paper_outputs
      - run: pytest -q
